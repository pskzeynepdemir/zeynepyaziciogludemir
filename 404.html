<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa bulunamadı — Zeynep Yazıcıoğlu Demir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* 404 her URL derinliğinde sunulabildiği için stiller burada gömülü tutulur */
  :root{--bg:#100904;--cream:#ffedd7;--cork:#40372e;--cork-fill:#382416;--sienna:#dc5000;--muted:#6c5f51;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--cream);
    font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;font-weight:400;
    line-height:1.5;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:20px;padding:24px;}
  .kicker{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
  h1{font-weight:500;font-size:clamp(34px,6vw,51px);line-height:0.92;}
  p{color:var(--muted);max-width:46ch;}
  .btn{font-family:inherit;font-weight:400;font-size:14px;letter-spacing:0.04em;text-decoration:none;
    background:var(--cork-fill);color:var(--cream);border:1px solid var(--cork-fill);
    border-radius:36px;padding:14px 28px;margin-top:6px;display:inline-block;
    transition:border-color .3s ease;}
  .btn:hover{border-color:var(--sienna);}
  .dots{display:flex;gap:10px;margin-bottom:6px;}
  .dots span{width:10px;height:10px;border-radius:50%;background:var(--sienna);display:block;}
</style>
<!-- clarity:start -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xbzxgnrk38");
</script>
<!-- clarity:end -->
</head>
<body>
  <div class="dots"><span></span><span></span><span></span></div>
  <span class="kicker">404</span>
  <h1>aradığınız sayfayı bulamadık</h1>
  <p>Bağlantı taşınmış ya da hiç var olmamış olabilir. Ana sayfaya dönüp tekrar deneyebilirsiniz.</p>
  <a href="/" id="home" class="btn">Ana sayfaya dön</a>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      if (location.hostname.endsWith('github.io') && parts.length > 0) {
        document.getElementById('home').href = '/' + parts[0] + '/';
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa bulunamadı — Zeynep Yazıcıoğlu Demir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@100;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* 404 her URL derinliğinde sunulabildiği için stiller burada gömülü tutulur */
  :root{--cream:#f2f0e9;--ink:#3a2e27;--pencil:#a1a0a0;--cobalt:#863a29;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    font-weight:300;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:18px;padding:24px;}
  .kicker{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--pencil);}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:42px;letter-spacing:-0.03em;
    line-height:0.96;text-transform:lowercase;}
  p{color:var(--ink);max-width:44ch;}
  .btn{font-family:'Inter',sans-serif;font-weight:400;font-size:15px;text-decoration:none;
    background:var(--cobalt);color:#fff;border:1px solid var(--ink);border-radius:5px;
    padding:14px 30px;margin-top:6px;display:inline-block;}
  .strip{display:flex;gap:8px;margin-bottom:8px;}
  .strip span{width:42px;height:42px;border-radius:12px;display:block;}
</style>
</head>
<body>
  <div class="strip">
    <span style="background:#3f593d;"></span>
    <span style="background:#863a29;"></span>
    <span style="background:#d8c660;"></span>
    <span style="background:#a9ab72;"></span>
  </div>
  <span class="kicker">404</span>
  <h1>aradığınız sayfayı bulamadık</h1>
  <p>Bağlantı taşınmış ya da hiç var olmamış olabilir. Ana sayfaya dönüp tekrar deneyebilirsiniz.</p>
  <a href="/" id="home" class="btn">Ana sayfaya dön</a>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      if (location.hostname.endsWith('github.io') && parts.length > 0) {
        document.getElementById('home').href = '/' + parts[0] + '/';
      }
    })();
  </script>
</body>
</html>
